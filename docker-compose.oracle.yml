version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: capivara_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-capivara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-capivara_password}
      POSTGRES_DB: ${POSTGRES_DB:-capivara_bet}
      # Optimized for 12GB RAM (allocate ~4GB to PostgreSQL)
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c max_connections=100
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - capivara-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capivara}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: capivara_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-capivara}:${POSTGRES_PASSWORD:-capivara_password}@db:5432/${POSTGRES_DB:-capivara_bet}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ORACLE_DEPLOYMENT=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capivara-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: capivara_dashboard
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-capivara}:${POSTGRES_PASSWORD:-capivara_password}@db:5432/${POSTGRES_DB:-capivara_bet}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capivara-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  collector:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: capivara_collector
    command: python -m jobs.collection_service
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-capivara}:${POSTGRES_PASSWORD:-capivara_password}@db:5432/${POSTGRES_DB:-capivara_bet}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - ORACLE_DEPLOYMENT=true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capivara-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f collection_service || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local

networks:
  capivara-network:
    driver: bridge
